<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- ປ້ອງກັນ Cache ຂອງ Browser -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<base target="_top">
<title>HR Connect</title>

<!-- ໃສ່ Version ໃຫ້ Manifest ເພື່ອໃຫ້ Browser ກວດສອບການປ່ຽນແປງ -->
<link rel="manifest" href="manifest.json?v=1.0.2">
<meta name="theme-color" content="#1C5CAB">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont;
    background-color: #1C5CAB;
  }

  /* Splash Screen */
  #splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1C5CAB, #0F3B7A);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    z-index: 9999;
    transition: opacity .5s ease;
  }

  #logo {
    width: 72px;
    height: 72px;
    margin-bottom: 16px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 4px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 14px;
    opacity: .9;
  }

  iframe {
    display: none;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>

<body>

<!-- Splash Screen -->
<div id="splash">
  <img id="logo" src="icon-192.png" alt="HR Connect">
  <div class="spinner"></div>
  <div id="status-text" class="loading-text">ກຳລັງກວດສອບເວີຊັນໃໝ່...</div>
</div>

<!-- App Iframe -->
<iframe
  id="app"
  src="https://script.google.com/macros/s/AKfycbyO9u4Bkv3ee1oFK-2MtuHY15I2nxYwS2AVVXTSLLJzdzALvAhHJAndGk2YWR-2ajNR/exec"
  allow="fullscreen">
</iframe>

<script>
  // --- ລະບົບຈັດການ Version ---
  const APP_VERSION = '1.0.2'; // ** ປ່ຽນເລກນີ້ທຸກຄັ້ງທີ່ທ່ານ Update Code ໃນ GitHub **

  function checkUpdate() {
    const savedVersion = localStorage.getItem('app_version');
    const statusText = document.getElementById('status-text');

    if (savedVersion !== APP_VERSION) {
      console.log('ກຳລັງອັບເດດເປັນເວີຊັນໃໝ່...');
      statusText.innerText = 'ກຳລັງອັບເດດລະບົບໃໝ່...';
      
      // ບັນທຶກ Version ໃໝ່ລົງໃນເຄື່ອງ
      localStorage.setItem('app_version', APP_VERSION);
      
      // ບັງຄັບ Reload ເພື່ອດຶງໄຟລ໌ໃໝ່ຈາກ GitHub
      window.location.reload(true);
      return false;
    }
    return true;
  }

  // ເລີ່ມການເຮັດວຽກ
  window.addEventListener('load', () => {
    if (checkUpdate()) {
      const splash = document.getElementById('splash');
      const app = document.getElementById('app');
      const statusText = document.getElementById('status-text');

      statusText.innerText = 'ກຳລັງໂຫຼດຂໍ້ມູນ...';

      // ເມື່ອ Iframe ໂຫຼດສຳເລັດ
      app.onload = () => {
        setTimeout(() => {
          splash.style.opacity = 0;
          app.style.display = 'block';

          setTimeout(() => {
            splash.style.display = 'none';
          }, 500);
        }, 1000); // ໜ່ວງເວລາໃຫ້ Splash ເບິ່ງ smooth
      };
    }
  });
</script>

</body>
</html>
