<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>HR Connect</title>
<link rel="manifest" href="manifest.json?v=3.0.1">
<meta name="theme-color" content="#1C5CAB">
<link rel="apple-touch-icon" href="icon-192.png">
  <!-- ນຳເຂົ້າຟອນ Noto Sans Lao ຈາກ Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">

<style>
  {
  font-family: 'Noto Sans Lao', sans-serif;
}
  body { margin: 0; padding: 0; overflow: hidden; font-family: system-ui, sans-serif; background-color: #1C5CAB; }
  #splash {
    position: fixed; inset: 0; background: linear-gradient(135deg, #1C5CAB, #0F3B7A);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; z-index: 9999; transition: opacity .5s ease;
  }
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* ປຸ່ມສຳຮອງ ຖ້າມັນຄ້າງ */
  #retry-btn {
    margin-top: 20px; padding: 10px 20px; background: rgba(255,255,255,0.2);
    border: 1px solid #fff; color: #fff; border-radius: 20px;
    display: none; cursor: pointer; text-decoration: none; font-size: 14px;
  }
  
  iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>

<div id="splash">
  <img src="icon-192.png" width="80" height="80" style="margin-bottom:20px">
  <div class="spinner"></div>
  <div id="status">ກຳລັງໂຫຼດ...</div>
  <!-- ປຸ່ມນີ້ຈະໂຊຂຶ້ນມາເມື່ອໂຫຼດດົນເກີນໄປ -->
  <div id="retry-btn" onclick="hideSplash()">ຄລິກເພື່ອເຂົ້າແອັບ</div>
</div>

<iframe id="app" src="https://script.google.com/macros/s/AKfycbyO9u4Bkv3ee1oFK-2MtuHY15I2nxYwS2AVVXTSLLJzdzALvAhHJAndGk2YWR-2ajNR/exec"></iframe>

<script>
  // --- 1. ບັງຄັບ Version ໃໝ່ທຸກຄັ້ງ ---
  const VERSION = '2.0.2'; 
  
  function forceUpdate() {
    const currentVer = localStorage.getItem('app_v');
    if (currentVer !== VERSION) {
      localStorage.setItem('app_v', VERSION);
      // ບັງຄັບ Reload ຈາກ Server (ລ້າງ Cache)
      window.location.reload(true);
    }
  }
  forceUpdate();

  const splash = document.getElementById('splash');
  const app = document.getElementById('app');
  const retryBtn = document.getElementById('retry-btn');

  function hideSplash() {
    splash.style.opacity = '0';
    setTimeout(() => { splash.style.display = 'none'; }, 500);
  }

  // ຖ້າ Iframe ໂຫຼດສຳເລັດ
  app.onload = () => {
    hideSplash();
  };

  // ຖ້າຜ່ານໄປ 5 ວິນາທີ ແລ້ວຍັງບໍ່ຫາຍຄ້າງ ໃຫ້ສະແດງປຸ່ມກົດເອງ
  setTimeout(() => {
    if (splash.style.display !== 'none') {
       document.getElementById('status').innerText = "ການເຊື່ອມຕໍ່ຊ້າ...";
       retryBtn.style.display = 'block';
    }
  }, 5000);

  // ບັງຄັບປິດ Splash ທັນທີຫຼັງ 10 ວິນາທີ ບໍ່ວ່າຈະໂຫຼດແລ້ວຫຼືບໍ່
  setTimeout(hideSplash, 10000);
</script>

</body>
</html>
