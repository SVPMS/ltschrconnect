<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>HR Connect</title>

<!-- ນຳເຂົ້າຟອນ Noto Sans Lao ຈາກ Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json?v=2.0.2">
<meta name="theme-color" content="#1C5CAB">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  /* ກຳນົດຟອນໃຫ້ທັງໝົດ */
  * {
    font-family: 'Noto Sans Lao', sans-serif;
  }

  body { 
    margin: 0; 
    padding: 0; 
    overflow: hidden; 
    background-color: #1C5CAB; 
  }

  /* Splash Screen */
  #splash {
    position: fixed; 
    inset: 0; 
    background: linear-gradient(135deg, #1C5CAB, #0F3B7A);
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center;
    color: #fff; 
    z-index: 9999; 
    transition: opacity .5s ease;
  }

  .spinner { 
    width: 40px; 
    height: 40px; 
    border: 4px solid rgba(255,255,255,.3); 
    border-top-color: #fff; 
    border-radius: 50%; 
    animation: spin 1s linear infinite; 
    margin-bottom: 15px; 
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  
  #status {
    font-size: 16px;
    font-weight: 400;
  }

  /* ປຸ່ມສຳຮອງ ຖ້າມັນຄ້າງ */
  #retry-btn {
    margin-top: 25px; 
    padding: 12px 24px; 
    background: rgba(255,255,255,0.2);
    border: 1px solid #fff; 
    color: #fff; 
    border-radius: 30px;
    display: none; 
    cursor: pointer; 
    font-size: 14px;
    transition: background 0.3s;
  }
  
  #retry-btn:active {
    background: rgba(255,255,255,0.4);
  }
  
  iframe { 
    position: fixed; 
    inset: 0; 
    width: 100%; 
    height: 100%; 
    border: none; 
    display: block; 
  }
</style>
</head>
<body>

<div id="splash">
  <img src="icon-192.png" width="80" height="80" style="margin-bottom:20px; border-radius: 20%;">
  <div class="spinner"></div>
  <div id="status">ກຳລັງໂຫຼດລະບົບ...</div>
  <!-- ປຸ່ມກົດຖ້າຄ້າງ -->
  <div id="retry-btn" onclick="hideSplash()">ຄລິກບ່ອນນີ້ເພື່ອເຂົ້າແອັບ</div>
</div>

<!-- Link ຂອງ Google Apps Script -->
<iframe id="app" src="https://script.google.com/macros/s/AKfycbyO9u4Bkv3ee1oFK-2MtuHY15I2nxYwS2AVVXTSLLJzdzALvAhHJAndGk2YWR-2ajNR/exec"></iframe>

<script>
  // --- 1. ລະບົບບັງຄັບອັບເດດ Version ---
  const VERSION = '2.0.2'; // ປ່ຽນເລກນີ້ທຸກຄັ້ງທີ່ແກ້ Code
  
  function forceUpdate() {
    const currentVer = localStorage.getItem('app_v');
    if (currentVer !== VERSION) {
      localStorage.setItem('app_v', VERSION);
      // ບັງຄັບ Reload ແລະ ລ້າງ Cache
      window.location.replace(window.location.href.split('?')[0] + '?v=' + VERSION);
    }
  }
  forceUpdate();

  const splash = document.getElementById('splash');
  const app = document.getElementById('app');
  const retryBtn = document.getElementById('retry-btn');
  const statusTxt = document.getElementById('status');

  function hideSplash() {
    splash.style.opacity = '0';
    setTimeout(() => { 
      splash.style.display = 'none'; 
    }, 500);
  }

  // ເມື່ອ Iframe ໂຫຼດສຳເລັດ
  app.onload = () => {
    hideSplash();
  };

  // ຖ້າມັນຄ້າງເກີນ 6 ວິນາທີ ໃຫ້ໂຊປຸ່ມກົດເອງ
  setTimeout(() => {
    if (splash.style.display !== 'none') {
       statusTxt.innerText = "ການເຊື່ອມຕໍ່ອາດຈະຊ້າ...";
       retryBtn.style.display = 'block';
    }
  }, 6000);

  // ບັງຄັບປິດ Splash ຫຼັງ 12 ວິນາທີ (ກໍລະນີສຸກເສີນ)
  setTimeout(hideSplash, 12000);
</script>

</body>
</html>
